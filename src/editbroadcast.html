<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>LINE自動配信ツール</title>
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="form.css">
  </head>
  <body>
    <h2>配信予約編集</h2>
    <div class="cp_iptxt">
      <h3>配信予約</h3>
      <div class="cp_ipselect cp_sl01">
        <select id="broadcast-select">
          <option value="">--配信予約選択--</option>
        </select>
      </div>
    </div>
    <div class="cp_iptxt">
      <h3>チャネル</h3>
      <div class="cp_ipselect cp_sl01">
        <select id="channel-select" required>
          <option value="">--チャネル選択--</option>
        </select>
      </div>
    </div>
    <div class="cp_iptxt">
      <h3>プラン</h3>
      <div class="cp_ipselect cp_sl01">
        <select id="plan-select">
          <option value="">--プラン選択--</option>
        </select>
      </div>
    </div>
    <div class="dialogs">
      <h3>配信日選択</h3>
      <div class="date01">
        <label class="modal datelabel" for="date">
          <input type="date" id="date" name="配信日" value="">
        </label>
      </div>
      <h3>配信時刻選択</h3>
      <div class="time01">
        <label class="modal timelabel" for="time">
          <input type="time" id="time" name="配信時刻" value="00:00">
        </label>
      </div>
    </div>
    <div id="csvfile" class="buttonarea">
      <button class="button-g" value="reader" onclick="readCSV()">顧客番号CSV読込</button>
      <div id="csvfilepath"></div>
    </div>
    <div id="editbtn" class="buttonarea">
      <button class="button-g" value="register" onclick="register()">配信編集</button>
    </div>
    <div id="editbtn" class="buttonarea">
      <button class="button-g button-8" value="register" onclick="deleteit('broadcast')">配信削除</button>
    </div>
    <div class="buttonarea">
      <button class="button-g button-4" value="back" onclick="history.back()">戻る</button>
    </div>
    <script>
      // 配信ジャンル
      const broadcastDom = document.getElementById('broadcast-select');
      // 配信編集エリア
      const editAreaDom = document.getElementById('editbroadcast');
      // 編集対象
      const editbtnDom = document.getElementById('editbtn');
      // 配信ID
      const broadcastID = broadcastDom.value;

      // 配信登録完了
      window.api.on("register_finish", arg => {
        // メッセージオプション
        const messageOption = {
          title: "登録完了",
          message: "登録が完了しました",
          type: "info",
        }
        // メッセージ送付
        window.api.send("showmessage", messageOption);
        // フォームクリア
        broadcastDom.options[0].selected = true;
      });

      // 配信削除完了
      window.api.on("delete_finish", _ => {
        // メッセージオプション
        const messageOption = {
          title: "削除完了",
          message: "配信削除が完了しました",
          type: "info",
        }
        // メッセージ送付
        window.api.send("showmessage", messageOption);
        // フォームクリア
        broadcastDom.options[0].selected = true;
      });

      // エラー発生
      window.api.on("error", arg => {
        // メッセージオプション
        const messageOption = {
          title: "エラー",
          message: arg,
          type: "fatal",
        }
        // ポップアップ表示
        window.api.send("showmessage", messageOption);
      });

      // 配信一覧
      window.api.on("broadcastMasterlist", arg => {
        try {
          // ジャンル自動生成
          arg.forEach((obj, idx) => {
            // オプションタグ生成
            const option = document.createElement('option');
            // 値代入
            option.value = String(obj.id);
            // ジャンル代入
            option.textContent = obj.broadcastname;
            // セレクトに追加
            broadcastDom.appendChild(option);
          });
          
        } catch(e) {
          // エラー処理
          console.log(e);
        }
      });

      // チャンネル
      window.api.on("channelMasterllist", arg => {
        try {
          // プラン自動生成
          arg.forEach((obj, idx) => {
            // オプションタグ生成
            const option = document.createElement('option');
            // 値代入
            option.value = String(obj.id);
            // プラン代入
            option.textContent  = `${obj.id}: ${obj.channelname}`;
            // セレクトに追加
            channelDom.appendChild(option);
          });

        } catch(e) {
          // エラー処理
          console.log(e);
        }
      });

      // プラン
      window.api.on("planMasterllist", arg => {
        try {
          // プラン自動生成
          arg.forEach((obj, idx) => {
            // オプションタグ生成
            const option = document.createElement('option');
            // 値代入
            option.value = String(obj.id);
            // プラン代入
            option.textContent  = `${obj.id}: ${obj.planname}`;
            // セレクトに追加
            plannameDom.appendChild(option);
          });

        } catch(e) {
          // エラー処理
          console.log(e);
        }
      });
    
      // ページ遷移
      const transfer = channel => {
        try {
          // 配信ページ遷移
          window.api.send("page", channel);

        } catch(e) {
          // エラー処理
          console.log(e);
        }
      }

      // CSVモード
      const readCSV = () => {
        try {
          // CSVモード
          window.api.send("csv");

        } catch(e) {
          // エラー処理
          window.api.send("error", e);
        }
      }

      // 配信登録
      const register = () => {
        try {
          // エラーフラグ
          let errorflg = false;
          // エラーメッセージ
          let errorArray = [];
         
          /* バリデーション */
          // 配信名
          if (broadcastDom.options[0].selected) {
            errorArray.push("チャネルを選択してください");
            errorflg = true;
          }
          
          // エラーなし
          if (!errorflg) {
            // 配信モード
            window.api.send("broadcastedit", broadcastID);

          } else {
            // メッセージオプション
            const messageOption = {
              title: "エラー",
              message: errorArray.join("|"),
              type: "error",
            }
            // エラー表示
            window.api.send("showmessage", messageOption);
          }
        
        } catch(e) {
          // エラー処理
          window.api.send("error", e);
        }
      }

      // 配信削除
      const deleteit = (table) => {
        try {
          // 送付内容
          const sendObj = {
            table: table,
            id: broadcastID,
            name: broadcastDom.innerHTML,
          }
          // 配信モード
          window.api.send("delete", sendObj);

        } catch(e) {
          // エラー処理
          window.api.send("error", e);
        }
      }

      // セレクトボックス変更
      const typechange = obj => {
        // 選択インデックス
        const idx = obj.selectedIndex;
        // 値
        const value = obj.options[idx].value;
      
        // 値とテキストをコンソールに出力
        if (value == "" || value == "1") {
          editAreaDom.style.display ="none";

        } else {
          editAreaDom.style.display ="block";
        }
      }
    </script>
  </body>
</html>
